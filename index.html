<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>MMD Web 3D Viewer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #333;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #video-container {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 240px;
            height: 180px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            overflow: hidden;
            z-index: 9999;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            /* Mirror the video */
        }

        /* エラーコンテナのスタイル */
        #error-container {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        #error-container h3 {
            margin-bottom: 15px;
            font-size: 20px;
        }

        #error-container p {
            line-height: 1.6;
        }

        /* カメラ同意UIのスタイル */
        #consent-box h2 {
            margin: 0 0 20px 0;
        }

        #consent-box button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            transition: all 0.2s ease;
        }

        #allow-camera:hover {
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }

        #deny-camera:hover {
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }

        #video-container:hover {
            transform: scale(1.05);
        }

        .hidden {
            display: none !important;
        }

        /* ===== Face Tracking HUD ===== */
        #tracking-hud {
            position: fixed;
            top: 16px;
            left: 16px;
            width: 220px;
            background: rgba(0, 0, 0, 0.60);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 10px 14px 12px;
            z-index: 9998;
            font-family: 'Segoe UI', 'Consolas', monospace;
            font-size: 11px;
            color: #e0e0e0;
            user-select: none;
            pointer-events: none;
        }

        #tracking-hud .hud-title {
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 0.08em;
            color: #94d2ff;
            margin-bottom: 7px;
            text-transform: uppercase;
        }

        #tracking-hud .hud-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 5px;
        }

        #tracking-hud .hud-label {
            width: 50px;
            color: #aaa;
            flex-shrink: 0;
        }

        #tracking-hud .hud-val {
            width: 44px;
            text-align: right;
            flex-shrink: 0;
            font-variant-numeric: tabular-nums;
            color: #fff;
        }

        #tracking-hud .hud-bar-bg {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        #tracking-hud .hud-bar-fill {
            position: absolute;
            top: 0;
            height: 100%;
            border-radius: 3px;
            transition: left 0.05s linear, width 0.05s linear;
        }

        .bar-x {
            background: #4fc3f7;
        }

        .bar-y {
            background: #a5d6a7;
        }

        .bar-z {
            background: #ffcc80;
        }

        #hud-face-status {
            display: inline-block;
            padding: 1px 7px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        #hud-face-status.on {
            background: rgba(0, 220, 100, 0.25);
            color: #4cffaa;
            border: 1px solid #4cffaa55;
        }

        #hud-face-status.off {
            background: rgba(220, 60, 60, 0.25);
            color: #ff7070;
            border: 1px solid #ff707055;
        }

        /* ランドマーク overlay canvas */
        #landmark-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9997;
        }
    </style>
</head>

<body>
    <div id="consent-overlay"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); display: flex; align-items: center; justify-content: center; z-index: 9999;">
        <div id="consent-box"
            style="background: linear-gradient(135deg, #1e3a8a 0%, #1e293b 100%); color: #fff; padding: 40px; border-radius: 16px; max-width: 500px; text-align: center; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);">
            <h2 style="margin-bottom: 20px; font-size: 24px;">📹 カメラアクセスの許可</h2>
            <p style="margin-bottom: 15px; line-height: 1.6; color: #cbd5e1;">
                このアプリケーションは、あなたの表情をリアルタイムで3Dキャラクターに反映させるため、
                ウェブカメラを使用します。
            </p>
            <p style="margin-bottom: 15px; line-height: 1.6; color: #cbd5e1;">
                <strong style="color: #fbbf24;">🔒 プライバシー保護</strong><br>
                収集された映像データは、お使いのデバイス内でのみ処理され、
                外部サーバーへ送信されることは一切ありません。
            </p>
            <div style="margin-top: 30px; display: flex; gap: 15px; justify-content: center;">
                <button id="allow-camera"
                    style="padding: 12px 30px; font-size: 16px; background: #10b981; color: white; border: none; border-radius: 8px; cursor: pointer;">許可する</button>
                <button id="deny-camera"
                    style="padding: 12px 30px; font-size: 16px; background: #ef4444; color: white; border: none; border-radius: 8px; cursor: pointer;">拒否する</button>
            </div>
        </div>
    </div>

    <div id="video-container" style="display: none;">
        <video id="input_video" playsinline></video>
        <button id="switch-camera" style="
            position: absolute;
            bottom: 5px;
            right: 40px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 10px;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(2px);
            transition: all 0.2s;
        ">📷 ｶﾒﾗ切替</button>
        <button id="hide-camera" onclick="document.getElementById('video-container').style.display='none'" style="
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 10px;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(2px);
            transition: all 0.2s;
        ">✖ 消す</button>
    </div>

    <div id="error-container"
        style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.9); border: 2px solid #ef4444; color: white; padding: 30px; border-radius: 16px; z-index: 10000; max-width: 400px; text-align: center; box-shadow: 0 0 30px rgba(239, 68, 68, 0.3);">
        <h3 id="error-title" style="color: #ef4444;">⚠ カメラの制限</h3>
        <p id="error-message" style="font-size: 14px; margin: 15px 0;"></p>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button onclick="document.getElementById('error-container').style.display='none'"
                style="padding: 10px 20px; background: #444; color: white; border: none; border-radius: 8px; cursor: pointer;">閉じる</button>
            <button onclick="location.reload()"
                style="padding: 10px 20px; background: #ef4444; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">再読み込み</button>
        </div>
    </div>

    <!-- Face Tracking HUD -->
    <canvas id="landmark-canvas"></canvas>
    <div id="tracking-hud">
        <div class="hud-title">📡 Face Tracking</div>
        <span id="hud-face-status" class="off">● NOT DETECTED</span>
        <!-- X -->
        <div class="hud-row">
            <span class="hud-label">Track X</span>
            <span class="hud-val" id="hud-x">---</span>
            <div class="hud-bar-bg">
                <div class="hud-bar-fill bar-x" id="bar-x" style="left:50%;width:0%;"></div>
            </div>
        </div>
        <!-- Y -->
        <div class="hud-row">
            <span class="hud-label">Track Y</span>
            <span class="hud-val" id="hud-y">---</span>
            <div class="hud-bar-bg">
                <div class="hud-bar-fill bar-y" id="bar-y" style="left:50%;width:0%;"></div>
            </div>
        </div>
        <!-- Z -->
        <div class="hud-row">
            <span class="hud-label">Depth Z</span>
            <span class="hud-val" id="hud-z">---</span>
            <div class="hud-bar-bg">
                <div class="hud-bar-fill bar-z" id="bar-z" style="left:50%;width:0%;"></div>
            </div>
        </div>
    </div>

    <!-- Three.js and Logic -->
    <script type="module" src="/script.js?v=MMD_001"></script>
</body>

</html>
